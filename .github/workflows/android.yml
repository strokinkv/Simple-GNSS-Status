name: Android CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Test, lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Run lint
        run: ./gradlew :app:lintDebug

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Prepare release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk "release/Simple-GNSS-Status-${GITHUB_REF_NAME}.apk"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-gnss-status-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Simple GNSS Status ${{ github.ref_name }}
          files: release/Simple-GNSS-Status-${{ github.ref_name }}.apk
